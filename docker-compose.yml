services:
  # ── Infrastructure ────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: liftivity
      POSTGRES_PASSWORD: Liftivity123
      POSTGRES_DB: liftivity_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U liftivity -d liftivity_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data

  # ── Apps ──────────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    depends_on:
      - redis

  web:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - api

  # ── Python services ───────────────────────────────────────────────────────
  nlp-service:
    build: "./AI Services/nlp-service"
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    ports:
      - "8001:8001"

  cv-service:
    build: "./AI Services/cv-service"
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    ports:
      - "8002:8002"

  scoring-service:
    build: "./AI Services/scoring-service"
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    ports:
      - "8003:8003"

volumes:
  postgres_data:
  redis_data:
