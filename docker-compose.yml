version: "3.9"

services:
  # ── Infrastructure ────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: liftivity
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: liftivity_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/db/migrations:/docker-entrypoint-initdb.d

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  # ── Apps ──────────────────────────────────────────────────────────────────
  api:
    build: ./apps/api
    restart: unless-stopped
    env_file: .env
    ports:
      - "3000:3000"
    depends_on:
      - postgres
      - redis

  worker:
    build: ./apps/worker
    restart: unless-stopped
    env_file: .env
    depends_on:
      - redis

  web:
    build: ./apps/web
    restart: unless-stopped
    ports:
      - "5173:5173"
    depends_on:
      - api

  # ── Python services ───────────────────────────────────────────────────────
  nlp-service:
    build: ./services/nlp-service
    restart: unless-stopped
    env_file: .env
    ports:
      - "8001:8001"

  cv-service:
    build: ./services/cv-service
    restart: unless-stopped
    env_file: .env
    ports:
      - "8002:8002"

  scoring-service:
    build: ./services/scoring-service
    restart: unless-stopped
    env_file: .env
    ports:
      - "8003:8003"

volumes:
  postgres_data:
