services:
  # ── Infrastructure ────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: liftivity
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: liftivity_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/db/migrations:/docker-entrypoint-initdb.d

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  # ── Apps ──────────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    ports:
      - "3000:3000"
    depends_on:
      - postgres
      - redis

  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    depends_on:
      - redis

  web:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - api

  # ── Python services ───────────────────────────────────────────────────────
  nlp-service:
    build: "./AI Services/nlp-service"
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    ports:
      - "8001:8001"

  cv-service:
    build: "./AI Services/cv-service"
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    ports:
      - "8002:8002"

  scoring-service:
    build: "./AI Services/scoring-service"
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    ports:
      - "8003:8003"

volumes:
  postgres_data:
